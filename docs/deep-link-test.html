<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAVM 深度链接测试页面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .examples {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 2px solid #f0f0f0;
        }

        .examples h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 20px;
        }

        .example-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .example-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }

        .example-title {
            font-weight: 600;
            color: #667eea;
            margin-bottom: 5px;
        }

        .example-url {
            font-size: 12px;
            color: #666;
            word-break: break-all;
        }

        .info {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 14px;
            color: #1976d2;
        }

        .generated-link {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            word-break: break-all;
            font-family: monospace;
            font-size: 12px;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 JAVM 深度链接测试</h1>
        <p class="subtitle">通过浏览器唤醒 JAVM 并添加下载任务</p>

        <div class="form-group">
            <label for="videoUrl">视频 URL *</label>
            <input 
                type="text" 
                id="videoUrl" 
                placeholder="https://example.com/video.mp4"
                value="https://example.com/sample-video.mp4"
            >
        </div>

        <div class="form-group">
            <label for="videoTitle">视频标题（可选）</label>
            <input 
                type="text" 
                id="videoTitle" 
                placeholder="示例视频"
                value="测试视频"
            >
        </div>

        <div id="generatedLink" class="generated-link" style="display: none;"></div>

        <div class="button-group">
            <button class="btn-primary" onclick="openDeepLink()">
                🚀 打开 JAVM 下载
            </button>
            <button class="btn-secondary" onclick="generateLink()">
                🔗 生成链接
            </button>
        </div>

        <div class="info">
            💡 提示：请确保 JAVM 应用已安装。首次使用时，浏览器可能会询问是否允许打开应用。
        </div>

        <div class="examples">
            <h2>📝 示例链接</h2>
            
            <div class="example-item" onclick="useExample('https://example.com/movie.mp4', '电影示例')">
                <div class="example-title">示例 1：基本用法</div>
                <div class="example-url">包含 URL 和标题</div>
            </div>

            <div class="example-item" onclick="useExample('https://cdn.example.com/video/test.mp4', '测试视频 2024')">
                <div class="example-title">示例 2：带特殊字符</div>
                <div class="example-url">标题包含空格和数字</div>
            </div>

            <div class="example-item" onclick="useExample('https://example.com/video.mp4', '')">
                <div class="example-title">示例 3：仅 URL</div>
                <div class="example-url">不提供标题，使用默认名称</div>
            </div>

            <div class="example-item" onclick="useExample('https://example.com/中文视频.mp4', '中文标题测试')">
                <div class="example-title">示例 4：中文字符</div>
                <div class="example-url">URL 和标题都包含中文</div>
            </div>
        </div>
    </div>

    <script>
        function buildDeepLink(url, title) {
            const encodedUrl = encodeURIComponent(url);
            const encodedTitle = encodeURIComponent(title);
            
            if (title) {
                return `javm://download?url=${encodedUrl}&title=${encodedTitle}`;
            } else {
                return `javm://download?url=${encodedUrl}`;
            }
        }

        function openDeepLink() {
            const url = document.getElementById('videoUrl').value.trim();
            const title = document.getElementById('videoTitle').value.trim();

            if (!url) {
                alert('请输入视频 URL');
                return;
            }

            const deepLink = buildDeepLink(url, title);
            console.log('打开深度链接:', deepLink);
            
            // 尝试打开深度链接
            window.location.href = deepLink;
        }

        function generateLink() {
            const url = document.getElementById('videoUrl').value.trim();
            const title = document.getElementById('videoTitle').value.trim();

            if (!url) {
                alert('请输入视频 URL');
                return;
            }

            const deepLink = buildDeepLink(url, title);
            const linkElement = document.getElementById('generatedLink');
            linkElement.textContent = deepLink;
            linkElement.style.display = 'block';
        }

        function useExample(url, title) {
            document.getElementById('videoUrl').value = url;
            document.getElementById('videoTitle').value = title;
            document.getElementById('generatedLink').style.display = 'none';
        }

        // 支持回车键提交
        document.getElementById('videoUrl').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                openDeepLink();
            }
        });

        document.getElementById('videoTitle').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                openDeepLink();
            }
        });
    </script>
</body>
</html>
